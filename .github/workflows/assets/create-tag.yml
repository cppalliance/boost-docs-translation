# Create a versioned tag when a PR from translation-{lang_code}-{version} into local-{lang_code} is merged.
# Tag format: {version}-{repo}-{lang_code} (e.g. boost-1.90.0-algorithm-zh_Hans).
# Skipped if the tag already exists.
# Workflow must exist on the default branch (master).

name: create-tag

on:
  pull_request:
    types: [closed]
    # Must match "${LOCAL_BRANCH_PREFIX}*" — see assets/env.sh (YAML cannot source shell).
    branches: ["local-*"]

permissions:
  contents: write

jobs:
  create-tag:
    runs-on: ubuntu-latest
    # head ref must start with TRANSLATION_BRANCH_PREFIX — see assets/env.sh.
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'translation-')
    steps:
      - name: Extract version and lang_code from branches
        id: tagname
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          REPO: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          # shellcheck source=assets/env.sh
          source "$GITHUB_WORKSPACE/.github/workflows/assets/env.sh"

          # lang_code from base branch: local-zh_Hans -> zh_Hans
          LANG_CODE="${BASE_REF#"${LOCAL_BRANCH_PREFIX}"}"

          # version from head branch: translation-zh_Hans-boost-1.90.0 -> strip prefix -> boost-1.90.0
          prefix="${TRANSLATION_BRANCH_PREFIX}${LANG_CODE}-"
          if [[ "$HEAD_REF" != "${prefix}"* ]]; then
            echo "Error: head ref '$HEAD_REF' does not start with expected prefix '$prefix'" >&2
            exit 1
          fi
          VERSION="${HEAD_REF#"${prefix}"}"

          # e.g. boost-1.90.0-algorithm-zh_Hans
          TAGNAME="${VERSION}-${REPO}-${LANG_CODE}"
          echo "tagname=$TAGNAME" >> "$GITHUB_OUTPUT"

      - name: Checkout local-{lang_code} branch with tags
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Create and push tag
        run: |
          TAGNAME="${{ steps.tagname.outputs.tagname }}"
          if git tag -l "$TAGNAME" | grep -q "^${TAGNAME}$"; then
            echo "Tag $TAGNAME already exists, skipping."
            exit 0
          fi
          git config user.name "Boost-Translation-CI-Bot"
          git config user.email "Boost-Translation-CI-Bot@cppalliance.local"
          git tag "$TAGNAME"
          git push origin "$TAGNAME"
