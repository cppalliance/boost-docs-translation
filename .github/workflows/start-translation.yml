# Sync existing Boost submodules (update docs and submodule pointers).
#
# Trigger: repository_dispatch with event_type "start-translation".
# Example: POST /repos/{owner}/{repo}/dispatches
#   Body: {"event_type": "start-translation", "client_payload": {"version": "boost-1.90.0"}}
#
# Submodules list is taken from .gitmodules of this repository at master
# (only libs/ entries). No new org repos are created; run add-submodules first.
#
# Jobs:
#   setup — validate lang_codes and emit matrix JSON.
#   sync-mirrors — sync mirror master for all submodules; update super-repo master.
#   start-local (matrix per lang) — local-{lang_code} in mirrors + super-repo + Weblate.
#
# client_payload:
#   lang_codes: (optional) Comma-separated lang codes (e.g. zh_Hans,ja). Defaults to vars.LANG_CODES.
#   version: (optional) Boost release ref (e.g. boost-1.90.0). Defaults to develop.
#   extensions: (optional) File extensions for Weblate (e.g. [.adoc, .md]). Default empty.
#
# Required secrets: SYNC_TOKEN, WEBLATE_URL, WEBLATE_TOKEN.
#   SYNC_TOKEN: push/PR access in MODULE_ORG. Repository variable SUBMODULES_ORG: org for
#   library repos (e.g. CppDigest). If unset, MODULE_ORG is this repo's org.
# Optional: LANG_CODES (used when lang_codes not in client_payload).

name: Start translation

on:
  repository_dispatch:
    types: [start-translation]

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      json: ${{ steps.langs.outputs.json }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          persist-credentials: false

      - name: Validate language codes
        id: langs
        env:
          LANG_CODES: ${{ github.event.client_payload.lang_codes || vars.LANG_CODES }}
        run: |
          set -euo pipefail
          # shellcheck source=assets/lib.sh
          source "$GITHUB_WORKSPACE/.github/workflows/assets/lib.sh"
          require_lang_codes
          mapfile -t lang_codes_arr < <(parse_list "$LANG_CODES")
          [[ ${#lang_codes_arr[@]} -eq 0 ]] && {
            echo "Error: LANG_CODES parsed to empty list." >&2; exit 1
          }
          validate_lang_codes "${lang_codes_arr[@]}"
          langs_json=$(printf '%s\n' "${lang_codes_arr[@]}" | jq -R . | jq -s -c .)
          echo "json=$langs_json" >> "$GITHUB_OUTPUT"
          echo "Lang codes: ${lang_codes_arr[*]}" >&2

  sync-mirrors:
    needs: setup
    runs-on: ubuntu-latest
    concurrency:
      group: translations-mirror-master
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          persist-credentials: false

      - name: Checkout master for .gitmodules
        run: |
          set -euo pipefail
          # shellcheck source=assets/env.sh
          source "$GITHUB_WORKSPACE/.github/workflows/assets/env.sh"
          git checkout "$MASTER_BRANCH"

      - name: Sync mirror master
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.SYNC_TOKEN }}
          LIBS_REF: ${{ github.event.client_payload.version || 'develop' }}
          START_PHASE: mirrors
          SUBMODULES_ORG: ${{ vars.SUBMODULES_ORG }}
        run: |
          set -euo pipefail

          [[ -z "${GITHUB_TOKEN:-}" ]] && {
            echo "Error: SYNC_TOKEN secret is not set." >&2
            exit 1
          }

          UPDATES=()
          META_MISSING=()
          NO_DOC_PATHS=()
          ORG_REPO_MISSING=()

          WORK_DIR=$(mktemp -d)
          trap 'rm -rf "$WORK_DIR"' EXIT
          BOOST_WORK="$WORK_DIR/boost"
          TRANS_DIR="$WORK_DIR/translations"
          mkdir -p "$BOOST_WORK"

          gh auth setup-git

          # shellcheck source=assets/env.sh
          source "$GITHUB_WORKSPACE/.github/workflows/assets/env.sh"
          # shellcheck source=assets/lib.sh
          source "$GITHUB_WORKSPACE/.github/workflows/assets/lib.sh"
          # shellcheck source=assets/translation.sh
          source "$GITHUB_WORKSPACE/.github/workflows/assets/translation.sh"

          # libs_ref is read by translation.sh (sourced).
          # shellcheck disable=SC2034
          libs_ref="${LIBS_REF:?}"

          ORG_WORK="$WORK_DIR/$MODULE_ORG"
          mkdir -p "$ORG_WORK"

          [[ ! -f .gitmodules ]] && {
            echo "Error: .gitmodules not found (run from translations repo with master checked out)" >&2
            exit 1
          }

          mapfile -t submodule_names < <(
            git config -f .gitmodules --get-regexp 'submodule\..*\.path' 2>/dev/null \
              | awk '{print $2}' | { grep '^libs/' || true; } | sed 's|^libs/||'
          )

          [[ ${#submodule_names[@]} -eq 0 ]] && {
            echo "No libs/ submodules in .gitmodules, nothing to sync." >&2; exit 0
          }

          echo "Syncing mirror master for ${#submodule_names[@]} submodules." >&2

          ensure_translations_cloned "$ORG" "$TRANSLATIONS_REPO" "$TRANS_DIR"

          total=${#submodule_names[@]}
          submodule_fatal=0
          for i in "${!submodule_names[@]}"; do
            sub="${submodule_names[$i]}"
            echo "[$(( i + 1 ))/$total] $sub ..." >&2
            if process_one_submodule "$sub"; then
              UPDATES+=("$sub")
            else
              rc=$?
              [[ $rc -eq 2 ]] && submodule_fatal=$((submodule_fatal + 1))
            fi
          done

          echo "── Summary: Boost library documentation metadata ──" >&2
          echo "  Type 1 — Missing or unreadable meta/libraries.json (${#META_MISSING[@]}): $([[ ${#META_MISSING[@]} -eq 0 ]] && echo '(none)' || echo "${META_MISSING[*]}")" >&2
          echo "  Type 2 — No doc paths in meta/libraries.json (${#NO_DOC_PATHS[@]}): $([[ ${#NO_DOC_PATHS[@]} -eq 0 ]] && echo '(none)' || echo "${NO_DOC_PATHS[*]}")" >&2
          echo "  Type 3 — Lib repo missing in org (run add-submodules first) (${#ORG_REPO_MISSING[@]}): $([[ ${#ORG_REPO_MISSING[@]} -eq 0 ]] && echo '(none)' || echo "${ORG_REPO_MISSING[*]}")" >&2

          [[ $submodule_fatal -gt 0 ]] && {
            echo "Error: $submodule_fatal submodule(s) failed with errors." >&2
            exit 1
          }

          finalize_translations_master "$TRANS_DIR" "$LIBS_REF"

          echo "Done." >&2

  start-local:
    needs: [setup, sync-mirrors]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lang: ${{ fromJson(needs.setup.outputs.json) }}
    concurrency:
      group: local-branch-${{ matrix.lang }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          persist-credentials: false

      - name: Checkout master for .gitmodules
        run: |
          set -euo pipefail
          # shellcheck source=assets/env.sh
          source "$GITHUB_WORKSPACE/.github/workflows/assets/env.sh"
          git checkout "$MASTER_BRANCH"

      - name: Start translation for ${{ matrix.lang }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.SYNC_TOKEN }}
          LIBS_REF: ${{ github.event.client_payload.version || 'develop' }}
          LANG_CODE: ${{ matrix.lang }}
          START_PHASE: local
          EXTENSIONS: ${{ github.event.client_payload.extensions || '' }}
          WEBLATE_URL: ${{ secrets.WEBLATE_URL }}
          WEBLATE_TOKEN: ${{ secrets.WEBLATE_TOKEN }}
          SUBMODULES_ORG: ${{ vars.SUBMODULES_ORG }}
        run: |
          set -euo pipefail

          [[ -z "${GITHUB_TOKEN:-}" ]] && {
            echo "Error: SYNC_TOKEN secret is not set." >&2
            exit 1
          }

          [[ -z "${WEBLATE_URL:-}" ]] && {
            echo "Error: WEBLATE_URL secret is not set." >&2
            exit 1
          }

          [[ -z "${WEBLATE_TOKEN:-}" ]] && {
            echo "Error: WEBLATE_TOKEN secret is not set." >&2
            exit 1
          }

          UPDATES=()
          declare -A add_or_update
          META_MISSING=()
          NO_DOC_PATHS=()
          ORG_REPO_MISSING=()

          # shellcheck source=assets/env.sh
          source "$GITHUB_WORKSPACE/.github/workflows/assets/env.sh"
          # shellcheck source=assets/lib.sh
          source "$GITHUB_WORKSPACE/.github/workflows/assets/lib.sh"
          validate_secrets weblate
          # shellcheck source=assets/translation.sh
          source "$GITHUB_WORKSPACE/.github/workflows/assets/translation.sh"

          WORK_DIR=$(mktemp -d)
          trap 'rm -rf "$WORK_DIR"' EXIT
          BOOST_WORK="$WORK_DIR/boost"
          TRANS_DIR="$WORK_DIR/translations"
          mkdir -p "$BOOST_WORK"

          gh auth setup-git

          # shellcheck disable=SC2153
          libs_ref="${LIBS_REF:?}"

          ORG_WORK="$WORK_DIR/$MODULE_ORG"
          mkdir -p "$ORG_WORK"

          trigger_weblate() {
            # Locals differ from WEBLATE_* env names to avoid ShellCheck SC2153 misspelling hints.
            local api_base_url="$1" api_token="$2" libs_ref="$3" exts_json="$4"

            local subs="${add_or_update[$LANG_CODE]:-}"
            [[ -z "$subs" ]] && {
              echo "Weblate skipped: no translations to update." >&2; return
            }
            local subs_json add_or_update_json
            subs_json=$(echo "$subs" | tr ' ' '\n' | grep -v '^$' | jq -R . | jq -s .)
            add_or_update_json=$(jq -n --arg lc "$LANG_CODE" --argjson s "$subs_json" \
              '{($lc): $s}')

            [[ "$add_or_update_json" == "{}" ]] && {
              echo "Weblate skipped: no translations to update." >&2; return
            }

            local payload
            payload=$(jq -n \
              --arg org "$MODULE_ORG" --arg ver "$libs_ref" \
              --argjson add "$add_or_update_json" --argjson ext "$exts_json" \
              '{organization:$org,add_or_update:$add,version:$ver,extensions:$ext}')

            echo "Weblate trigger parameters:" >&2
            echo "  organization: $MODULE_ORG" >&2
            echo "  version:      $libs_ref" >&2
            echo "  extensions:   $exts_json" >&2
            echo "  add_or_update:" >&2
            echo "$add_or_update_json" | jq -r 'to_entries[] | "    \(.key): \(.value | join(", "))"' >&2

            local resp http_code curl_exit=0
            resp=$(mktemp)
            http_code=$(curl -sS -o "$resp" -w "%{http_code}" --max-time 120 -X POST \
              -H "Authorization: Token $api_token" \
              -H "Content-Type: application/json" \
              -H "User-Agent: BoostDocsSync/1.0" \
              -d "$payload" \
              "${api_base_url%/}/${WEBLATE_ENDPOINT_PATH}" \
            ) || curl_exit=$?

            if [[ $curl_exit -ne 0 ]]; then
              echo "Weblate trigger failed (curl exit $curl_exit)." >&2
              cat "$resp" >&2 || true
              rm -f "$resp"
              return 1
            fi

            case "$http_code" in
              202)
                echo "Weblate add-or-update accepted (HTTP 202, async)." >&2
                jq . "$resp" >&2 || cat "$resp" >&2
                ;;
              200)
                echo "Weblate returned HTTP 200 (sync server); treating as success." >&2
                cat "$resp" >&2 || true
                ;;
              *)
                echo "Weblate returned HTTP $http_code (expected 202)." >&2
                cat "$resp" >&2 || true
                rm -f "$resp"
                return 1
                ;;
            esac
            rm -f "$resp"
          }

          validate_lang_codes "$LANG_CODE"
          echo "Lang code: $LANG_CODE" >&2

          # Read by process_one_submodule in translation.sh (sourced above).
          # shellcheck disable=SC2034
          lang_codes_arr=("$LANG_CODE")
          add_or_update["$LANG_CODE"]=""

          [[ ! -f .gitmodules ]] && {
            echo "Error: .gitmodules not found (run from translations repo with master checked out)" >&2
            exit 1
          }

          mapfile -t submodule_names < <(
            git config -f .gitmodules --get-regexp 'submodule\..*\.path' 2>/dev/null \
              | awk '{print $2}' | { grep '^libs/' || true; } | sed 's|^libs/||'
          )

          [[ ${#submodule_names[@]} -eq 0 ]] && {
            echo "No libs/ submodules in .gitmodules, nothing to sync." >&2; exit 0
          }

          echo "Processing local branches for ${#submodule_names[@]} submodules." >&2

          ensure_translations_cloned "$ORG" "$TRANSLATIONS_REPO" "$TRANS_DIR"
          ensure_local_branch_in_translations "$TRANS_DIR" "$LANG_CODE"

          total=${#submodule_names[@]}
          submodule_fatal=0
          for i in "${!submodule_names[@]}"; do
            sub="${submodule_names[$i]}"
            echo "[$(( i + 1 ))/$total] $sub ..." >&2
            if process_one_submodule "$sub"; then
              UPDATES+=("$sub")
            else
              rc=$?
              [[ $rc -eq 2 ]] && submodule_fatal=$((submodule_fatal + 1))
            fi
          done

          echo "── Summary: Boost library documentation metadata ──" >&2
          echo "  Type 1 — Missing or unreadable meta/libraries.json (${#META_MISSING[@]}): $([[ ${#META_MISSING[@]} -eq 0 ]] && echo '(none)' || echo "${META_MISSING[*]}")" >&2
          echo "  Type 2 — No doc paths in meta/libraries.json (${#NO_DOC_PATHS[@]}): $([[ ${#NO_DOC_PATHS[@]} -eq 0 ]] && echo '(none)' || echo "${NO_DOC_PATHS[*]}")" >&2
          echo "  Type 3 — Lib repo missing in org (run add-submodules first) (${#ORG_REPO_MISSING[@]}): $([[ ${#ORG_REPO_MISSING[@]} -eq 0 ]] && echo '(none)' || echo "${ORG_REPO_MISSING[*]}")" >&2

          [[ $submodule_fatal -gt 0 ]] && {
            echo "Error: $submodule_fatal submodule(s) failed with errors." >&2
            exit 1
          }

          finalize_translations_local "$TRANS_DIR" "$LIBS_REF" "$LANG_CODE"

          ext_arr=()
          [[ -n "${EXTENSIONS:-}" ]] && mapfile -t ext_arr < <(parse_extensions "$EXTENSIONS")
          exts_json="[]"
          [[ ${#ext_arr[@]} -gt 0 ]] && \
            exts_json=$(printf '%s\n' "${ext_arr[@]}" | jq -R . | jq -s .)

          trigger_weblate "$WEBLATE_URL" "$WEBLATE_TOKEN" "$LIBS_REF" "$exts_json"

          echo "Done." >&2
